name: Branch Name Check

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate branch name
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
        run: |
          set -euo pipefail

          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}"
          prohibited='claude|codex|opencode|copilot|cursor|windsurf|aider|goose|continue|devin|ai-agent|llm-agent|agent'
          allowed='^(feature|fix|refactor|chore|docs|test|release)/[a-zA-Z0-9._-]+$'

          echo "Branch: $branch"

          if echo "$branch" | grep -Eiq "$prohibited"; then
            echo "::error::Branch name exposes a prohibited tooling marker."
            exit 1
          fi

          if [ -n "$PR_TITLE" ] &&
            echo "$PR_TITLE" | grep -Eiq "$prohibited"; then
            echo "::error::Pull request title exposes a prohibited tooling marker."
            exit 1
          fi

          if [ "$branch" != "$DEFAULT_BRANCH" ] &&
            ! echo "$branch" | grep -Eq "$allowed"; then
            echo "::error::Branch name must use an approved repository prefix."
            exit 1
          fi
